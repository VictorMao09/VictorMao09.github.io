<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面跳转中...</title>
    
    <!-- 方法一：使用 meta 标签实现自动跳转（推荐，无需 JavaScript） -->
    <!-- content="0" 表示延迟 0 秒后执行跳转，即页面加载后立即跳转 -->
    <!-- 若想设置延迟，例如 3 秒后跳转，可改为 content="3; url=... -->
    <meta http-equiv="refresh" content="0; url=https://VictorMao.github.io/FIT%20WISE_2026.html">
    
</head>
<body>
    <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif; color: #333;">
        <h1>正在跳转...</h1>
        <p>如果页面没有自动跳转，请<a href="https://VictorMao.github.io/FIT%20WISE_2026.html">点击此处</a>。</p>
    </div>
</body>
</html>
