<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packaging Expert - 包装设计专家（带产品透视）</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0d1820 100%);
            margin: 0; padding: 20px; min-height: 100vh; color: #e0e8f0;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        .header {
            background: rgba(20,35,50,0.95); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px; padding: 20px 28px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 16px;
        }
        .header-left { flex: 1; }
        .header h1 { margin: 0; font-size: 1.7rem; color: #fff; }
        .header p { margin: 4px 0 0; opacity: 0.6; font-size: 0.85rem; }

        .header-controls {
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .toggle-row {
            display: flex; gap: 8px; align-items: center;
        }
        .toggle-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; padding: 6px 14px; color: #aac8e0;
            cursor: pointer; font-size: 0.78rem; font-weight: 600;
            transition: all 0.2s; white-space: nowrap;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.16); }
        .toggle-btn.active {
            background: #3a8fc0; color: #fff; border-color: #3a8fc0;
        }

        .card {
            background: rgba(20,32,45,0.92); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px; padding: 20px 24px; margin-bottom: 20px; backdrop-filter: blur(8px);
        }
        .section-title {
            font-size: 1.05rem; font-weight: 700; color: #88ccff;
            margin: 0 0 16px; padding-left: 10px; border-left: 4px solid #3a8fc0;
        }
        .param-grid { display: flex; flex-wrap: wrap; gap: 14px; }
        .param-item { flex: 1; min-width: 110px; }
        .param-item label { display: block; font-size: 0.7rem; opacity: 0.65; margin-bottom: 5px; letter-spacing: 0.5px; color: #aac8e0; }
        .param-item input, .param-item select {
            width: 100%; padding: 9px 12px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
            color: #fff; font-size: 0.85rem; transition: 0.2s;
        }
        .param-item input:focus, .param-item select:focus { outline: none; border-color: #3a8fc0; background: rgba(255,255,255,0.14); }
        .param-item select option { background: #1a2d3d; color: #fff; }

        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 18px 0; }

        .result-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
        .result-item { flex: 1; min-width: 150px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px 16px; }
        .result-label { font-size: 0.72rem; color: #88a8c0; text-transform: uppercase; margin-bottom: 4px; }
        .result-value { font-size: 1.15rem; font-weight: 700; color: #e0f0ff; }
        .result-area { font-size: 0.8rem; color: #ffcc88; margin-top: 3px; }

        .tip-box { background: rgba(44,100,150,0.25); border-left: 4px solid #3a8fc0; border-radius: 14px; padding: 12px 16px; font-size: 0.82rem; line-height: 1.6; margin-top: 12px; color: #cce0f0; }
        .warn-box { background: rgba(255,160,80,0.15); border-left: 4px solid #f4a261; border-radius: 14px; padding: 10px 16px; font-size: 0.8rem; margin-top: 12px; display: none; color: #ffe0b0; }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 30px; padding: 7px 18px; color: #aac8e0; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .tab-btn.active, .tab-btn:hover { background: #3a8fc0; color: #fff; border-color: #3a8fc0; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .diecut-wrap { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 16px; text-align: center; }
        .diecut-wrap svg { max-width: 100%; height: auto; border-radius: 12px; }
        .diecut-note { font-size: 0.72rem; color: #88a8c0; margin-top: 8px; }

        .three-scene { display: flex; flex-wrap: wrap; gap: 20px; }
        .scene-card { flex: 1; min-width: 280px; background: rgba(10,18,26,0.85); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 14px; transition: transform 0.2s; }
        .scene-card:hover { transform: translateY(-4px); }
        .scene-title { text-align: center; font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; padding: 6px; border-radius: 30px; background: rgba(0,0,0,0.4); }
        .cube-container { position: relative; width: 100%; aspect-ratio: 1/0.85; background: rgba(0,0,0,0.35); border-radius: 16px; overflow: hidden; cursor: grab; }
        canvas { width: 100%; height: 100%; display: block; border-radius: 14px; }
        .dim-info { text-align: center; font-size: 0.72rem; color: #cce0f0; background: rgba(0,0,0,0.35); border-radius: 12px; padding: 7px; margin-top: 8px; line-height: 1.5; }
        .area-hl { color: #ffcc88; font-weight: 700; }

        .material-bar { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 12px 18px; font-size: 0.8rem; color: #aac8e0; line-height: 1.8; }

        footer { text-align: center; font-size: 0.72rem; color: rgba(255,255,255,0.25); margin: 24px 0 8px; }

        @media (max-width: 800px) { .three-scene { flex-direction: column; } .param-item { min-width: 90px; } }

        .cylinder-hint { background: rgba(100,200,160,0.1); border-left: 3px solid #66cc88; border-radius: 10px; padding: 8px 12px; font-size: 0.75rem; color: #aaddcc; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-left">
            <h1>📦 Packaging Expert</h1>
            <p>Product → Container → Outer | 3D透视摆放 | 刀模图 + 耗料分析</p>
        </div>
        <div class="header-controls">
            <div class="toggle-row">
                <button class="toggle-btn active" id="unitBtn" onclick="toggleUnit()">📏 mm</button>
                <button class="toggle-btn" id="langBtn" onclick="toggleLang()">🌐 中</button>
            </div>
        </div>
    </div>

    <!-- 参数输入 -->
    <div class="card">
        <div class="section-title">📏 产品与包装参数</div>
        <div class="param-grid">
            <div class="param-item"><label>📐 产品长 (mm)</label><input type="number" id="prodL" value="120" step="1"></div>
            <div class="param-item"><label>📐 产品宽 (mm)</label><input type="number" id="prodW" value="80" step="1"></div>
            <div class="param-item"><label>📐 产品高 (mm)</label><input type="number" id="prodH" value="50" step="1"></div>
            <div class="param-item"><label>📦 每容器装量</label><input type="number" id="perSmall" value="12" step="1"></div>
            <div class="param-item"><label>📦 每外箱装量</label><input type="number" id="perOuter" value="6" step="1"></div>
            <div class="param-item"><label>🧷 缓冲间隙 (mm)</label><input type="number" id="gap" value="3" step="1"></div>
            <div class="param-item"><label>📄 瓦楞/壁厚 (mm)</label>
                <select id="flute">
                    <option value="0.4">E-flute (≈0.4mm)</option>
                    <option value="0.5">B-flute (≈0.5mm)</option>
                    <option value="0.7" selected>C-flute (≈0.7mm)</option>
                    <option value="1.0">Double-wall (≈1.0mm)</option>
                    <option value="1.5">Heavy-duty (≈1.5mm)</option>
                </select>
            </div>
        </div>
        <hr class="divider">
        <div class="param-grid">
            <div class="param-item"><label>📦 容器箱型</label>
                <select id="boxType">
                    <option value="0201">0201 标准箱 (RSC)</option>
                    <option value="tianDigai">天地盖 (盖底分离)</option>
                    <option value="planeBox">飞机盒 (自锁底)</option>
                    <option value="cylinder">🌀 圆柱体筒</option>
                </select>
            </div>
            <div class="param-item"><label>📦 外箱箱型</label>
                <select id="outerBoxType">
                    <option value="0201">0201 标准箱 (RSC)</option>
                    <option value="tianDigai">天地盖</option>
                    <option value="cylinder">🌀 圆柱体外箱</option>
                </select>
            </div>
            <div class="param-item"><label>🔨 接合方式</label>
                <select id="joint">
                    <option value="glue">胶水接合(整齐)</option>
                    <option value="staple">打钉接合(+5%强度)</option>
                </select>
            </div>
        </div>
        <div id="cylinderHint" class="cylinder-hint">🌀 圆柱模式：容器为圆筒，3D视图显示圆柱体，刀模图显示展开矩形+圆盖。</div>
        <div id="warnBox" class="warn-box">⚠️ 产品尺寸超出合理范围，建议 10~1500mm。</div>
    </div>

    <!-- 计算结果 -->
    <div class="card">
        <div class="section-title">📐 计算结果</div>
        <div id="resultsPanel" class="result-grid"></div>
        <div id="areaPanel" class="result-grid" style="margin-top:10px;"></div>
    </div>

    <!-- Tab：刀模图 / 3D效果图 -->
    <div class="card">
        <div class="tab-bar">
            <button class="tab-btn active" id="tabBtn_diecut" onclick="switchTab('diecut', this)">✂️ 刀模线示意图</button>
            <button class="tab-btn" id="tabBtn_model3d" onclick="switchTab('model3d', this)">🎲 3D 效果图（透视摆放）</button>
        </div>
        <div id="tab-diecut" class="tab-pane active">
            <div class="diecut-wrap"><div id="diecutSvgContainer"></div></div>
            <p class="diecut-note">※ 仅为示意图。红色虚线=压痕线，黑色实线=刀线。正式生产需使用工厂提供的刀模图。</p>
        </div>
        <div id="tab-model3d" class="tab-pane">
            <div class="three-scene" id="threeScenes">
                <div class="scene-card">
                    <div class="scene-title" style="color:#ff9988">📦 产品 3D（单个）</div>
                    <div class="cube-container" id="canvasProd"></div>
                    <div class="dim-info" id="prodInfo"></div>
                </div>
                <div class="scene-card">
                    <div class="scene-title" style="color:#ffcc88">📦 容器 3D（内含产品摆放）</div>
                    <div class="cube-container" id="canvasInner"></div>
                    <div class="dim-info" id="innerInfo"></div>
                </div>
                <div class="scene-card">
                    <div class="scene-title" style="color:#88ffbb">📦 外箱 3D（内含容器摆放）</div>
                    <div class="cube-container" id="canvasOuter"></div>
                    <div class="dim-info" id="outerInfo"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 承重评估 & 耗料 -->
    <div class="card">
        <div class="section-title">📊 承重与耗料分析</div>
        <div id="strengthAdvice" class="tip-box"></div>
        <div id="materialArea" class="material-bar" style="margin-top:12px;"></div>
    </div>

    <footer>
        <span id="visitCounter" style="opacity:0.5; font-size:0.68rem;"></span>
        <span id="footerLine1"></span><br>
        <span id="footerLine2"></span>
    </footer>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
}
</script>

// ═══════════════════════════════════════════════════
//  语言与单位状态
// ═══════════════════════════════════════════════════
let currentLang  = localStorage.getItem('pkgLang')  || 'en';
let currentUnit  = localStorage.getItem('pkgUnit')  || 'mm';
const MM_PER_INCH = 25.4;

function toggleLang() {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('pkgLang', currentLang);
    applyI18n();
    refreshAll();
}

function toggleUnit() {
    currentUnit = currentUnit === 'mm' ? 'inch' : 'mm';
    localStorage.setItem('pkgUnit', currentUnit);
    applyUnitToggle();
    refreshAll();
}

function applyUnitToggle() {
    const btn = document.getElementById('unitBtn');
    if (currentUnit === 'inch') {
        btn.textContent = '📏 inch';
        btn.classList.add('active');
    } else {
        btn.textContent = '📏 mm';
        btn.classList.remove('active');
    }
    const langBtn = document.getElementById('langBtn');
    langBtn.textContent = currentLang === 'zh' ? '🌐 中' : '🌐 EN';
    langBtn.classList.remove('active');
}

function applyI18n() {
    const d = I18N[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (d[key]) el.textContent = d[key];
    });
    const opts = {
        boxType:      ['opt_0201','opt_tianDigai','opt_planeBox','opt_cylinder'],
        outerBoxType: ['opt_0201_outer','opt_tianDigai_outer','opt_cylinder_outer'],
        joint:        ['opt_glue','opt_staple']
    };
    Object.entries(opts).forEach(([selId, keys]) => {
        const sel = document.getElementById(selId);
        if (!sel) return;
        sel.querySelectorAll('option').forEach((opt, i) => {
            if (keys[i] && d[keys[i]]) opt.textContent = d[keys[i]];
        });
    });
    const f1 = document.getElementById('footerLine1');
    const f2 = document.getElementById('footerLine2');

// ═══════════════════════════════════════════════════
//  排列算法
// ═══════════════════════════════════════════════════
function getArrangement(count, pL, pW, pH) {
    let best = { L: Infinity, W: Infinity, H: Infinity, vol: Infinity, arrangement: null };
    for (let a = 1; a <= count; a++) {
        if (count % a !== 0) continue;
        let bc = count / a;
        for (let b = 1; b <= bc; b++) {
            if (bc % b !== 0) continue;
            let c = bc / b;
            let perms = [
                { L: a*pL, W: b*pW, H: c*pH, arr: [a,b,c] },
                { L: a*pL, W: c*pW, H: b*pH, arr: [a,c,b] },
                { L: b*pL, W: a*pW, H: c*pH, arr: [b,a,c] },
                { L: b*pL, W: c*pW, H: a*pH, arr: [b,c,a] },
                { L: c*pL, W: a*pW, H: b*pH, arr: [c,a,b] },
                { L: c*pL, W: b*pW, H: a*pH, arr: [c,b,a] }
            ];
            for (let p of perms) {
                let v = p.L + p.W + p.H;
                if (v < best.vol) best = { L: p.L, W: p.W, H: p.H, vol: v, arrangement: p.arr };
            }
        }
    }
    return { length: best.L, width: best.W, height: best.H, arrangement: best.arr };
}

function outerDimRect(iL, iW, iH, flute, joint) {
    let add = flute * 2 + 1.2 + (joint === 'staple' ? 0.5 : 0);
    return { L: Math.ceil(iL+add), W: Math.ceil(iW+add), H: Math.ceil(iH+add) };
}

function calcCylinder(prodL, prodW, prodH, count, gap, flute) {
    const itemW  = prodL + gap;
    const itemD  = prodW + gap;
    const eff    = 0.72;
    const innerD = Math.ceil(Math.sqrt(itemW * itemD * count / eff / 0.785) + gap * 2);
    const innerH = prodH + gap * 2;
    const wt    = flute * 2;
    const outerD = innerD + wt * 2;
    const outerH = innerH + wt * 2;
    return { innerD, innerH, outerD, outerH, wall: wt };
}

function calcAreaRect(L, W, H, style) {
    if (style === '0201')    return ((L+H+25)*(W+H+10)) / 1e6;
    if (style === 'tianDigai') return ((L+H*2)*(W+H*2)) / 1e6;
    return ((L+H)*(W+H)*1.2) / 1e6;
}

function calcAreaCylinder(outerD, outerH) {
    const C       = Math.PI * outerD;
    const sideArea = C * outerH / 1e6;
    const lidArea  = Math.PI * Math.pow(outerD * 0.505, 2) * 2 / 1e6;
    return { side: sideArea, lids: lidArea, total: sideArea + lidArea };
}

let lastSizes = null;

function refreshAll() {
    const prodL    = parseFloat(document.getElementById('prodL').value) || 120;
    const prodW    = parseFloat(document.getElementById('prodW').value) || 80;
    const prodH    = parseFloat(document.getElementById('prodH').value) || 50;
    const perSmall = parseInt(document.getElementById('perSmall').value) || 12;
    const perOuter = parseInt(document.getElementById('perOuter').value) || 6;
    const gap      = parseFloat(document.getElementById('gap').value) || 3;
    const flute    = parseFloat(document.getElementById('flute').value) || 0.7;
    const boxStyle  = document.getElementById('boxType').value;
    const outerStyle= document.getElementById('outerBoxType').value;
    const joint    = document.getElementById('joint').value;
    const d = I18N[currentLang];
    const ul = unitLabel();

    document.getElementById('cylinderHint').style.display = (boxStyle === 'cylinder' || outerStyle === 'cylinder') ? 'block' : 'none';
    const warnEl = document.getElementById('warnBox');
    warnEl.style.display = (prodL<3||prodW<3||prodH<3||prodL>1500||prodW>1500||prodH>1500) ? 'block' : 'none';

    if (boxStyle === 'cylinder') {
        const cyl = calcCylinder(prodL, prodW, prodH, perSmall, gap, flute);
        const a   = calcAreaCylinder(cyl.outerD, cyl.outerH);
        const outerDim = getArrangement(perOuter, cyl.outerD, cyl.outerD, cyl.outerH);
        const outerOL = Math.ceil(outerDim.length + flute*2 + 2);
        const outerOW = Math.ceil(outerDim.width  + flute*2 + 2);
        const outerOH = Math.ceil(outerDim.height + flute*2 + 2);
        const aOuter = outerStyle === 'cylinder' ? calcAreaCylinder(outerOL, outerOH).total : calcAreaRect(outerOL, outerOW, outerOH, outerStyle);
        lastSizes = {
            product:  { L: prodL, W: prodW, H: prodH, isCyl: false, perSmall, perOuter },
            inner:    { isCyl: true, outerD: cyl.outerD, outerH: cyl.outerH, area: a.total, sideArea: a.side, lidArea: a.lids, perCount: perSmall },
            outer:    { isCyl: outerStyle==='cylinder', L: outerOL, W: outerOW, H: outerOH, D: outerStyle==='cylinder'?outerOL:0, area: aOuter, perCount: perOuter },
            boxStyle, outerStyle,
            productArrangement: { L: prodL, W: prodW, H: prodH },
            innerArrangement: null,
            outerArrangement: null
        };
        document.getElementById('resultsPanel').innerHTML = `
            <div class="result-item"><div class="result-label">${d.r_container_outer}</div><div class="result-value">Ø${fmt(cyl.outerD,1)}${ul} × ${fmt(cyl.outerH,1)}${ul}</div><div class="result-area">${d.r_area} ${a.total.toFixed(3)} m²</div></div>
            <div class="result-item"><div class="result-label">${d.r_outer_outer}</div><div class="result-value">${fmt(outerOL,0)}${ul}×${fmt(outerOW,0)}${ul}×${fmt(outerOH,0)}${ul}</div><div class="result-area">${d.r_area} ${aOuter.toFixed(3)} m²</div></div>
        `;
    } else {
        const prodBuf = { L: prodL+gap*2, W: prodW+gap*2, H: prodH+gap*2 };
        const smallArr = getArrangement(perSmall, prodBuf.L, prodBuf.W, prodBuf.H);
        const smallIn  = { L: smallArr.length, W: smallArr.width, H: smallArr.height, arrangement: smallArr.arrangement };
        const smallOut = outerDimRect(smallIn.L, smallIn.W, smallIn.H, flute, joint);
        const aSmall   = calcAreaRect(smallOut.L, smallOut.W, smallOut.H, boxStyle);
        const outerArr = getArrangement(perOuter, smallOut.L, smallOut.W, smallOut.H);
        const outerIn  = { L: outerArr.length, W: outerArr.width, H: outerArr.height, arrangement: outerArr.arrangement };
        const outerOut = outerDimRect(outerIn.L, outerIn.W, outerIn.H, flute, joint);
        const aOuter   = outerStyle==='cylinder' ? calcAreaCylinder(outerOut.L, outerOut.H).total : calcAreaRect(outerOut.L, outerOut.W, outerOut.H, outerStyle);
        lastSizes = {
            product: { L: prodL, W: prodW, H: prodH, isCyl: false, perSmall, perOuter },
            inner:  { isCyl: false, L: smallOut.L, W: smallOut.W, H: smallOut.H, area: aSmall, perCount: perSmall, arrangement: smallIn.arrangement, productSize: prodBuf },
            outer:  { isCyl: outerStyle==='cylinder', L: outerOut.L, W: outerOut.W, H: outerOut.H, area: aOuter, perCount: perOuter, arrangement: outerIn.arrangement, innerSize: smallOut },
            boxStyle, outerStyle
        };
        document.getElementById('resultsPanel').innerHTML = `
            <div class="result-item"><div class="result-label">${d.r_container_outer}</div><div class="result-value">${fmt(smallOut.L,0)}${ul}×${fmt(smallOut.W,0)}${ul}×${fmt(smallOut.H,0)}${ul}</div><div class="result-area">${d.r_area} ${aSmall.toFixed(3)} m²</div></div>
            <div class="result-item"><div class="result-label">${d.r_outer_outer}</div><div class="result-value">${fmt(outerOut.L,0)}${ul}×${fmt(outerOut.W,0)}${ul}×${fmt(outerOut.H,0)}${ul}</div><div class="result-area">${d.r_area} ${aOuter.toFixed(3)} m²</div></div>
        `;
    }

    let sm = "";
    if (boxStyle === 'cylinder') sm = d.str_cyl;
    else if (boxStyle === '0201') sm = d.str_0201;
    else if (boxStyle === 'tianDigai') sm = d.str_tianDigai;
    else sm = d.str_plane;
    if (joint === 'staple' && boxStyle !== 'cylinder') sm += d.str_staple;
    sm += `<br>${d.str_stack} ${Math.floor(8/(flute*2))}~${Math.floor(12/(flute*1.2))} (${currentLang==='zh'?'取决于纸板等级':'depends on board grade'}).`;
    document.getElementById('strengthAdvice').innerHTML = `📌 ${sm}`;

    let aInnerStr = lastSizes.inner.isCyl
        ? `${d.mat_inner_cyl}${lastSizes.inner.area.toFixed(3)} m² (side ${lastSizes.inner.sideArea.toFixed(3)} + lids ${lastSizes.inner.lidArea.toFixed(3)})`
        : `${d.mat_inner_box}${lastSizes.inner.area.toFixed(3)} m²`;
    let aOuterStr = lastSizes.outer && lastSizes.outer.isCyl
        ? `${d.mat_outer_cyl}${lastSizes.outer.area.toFixed(3)} m²`
        : `${d.mat_outer_box}${lastSizes.outer ? lastSizes.outer.area.toFixed(3) : '–'} m²`;
    document.getElementById('materialArea').innerHTML = `🧮 <strong>${currentLang==='zh'?'耗料总览':'Material Summary'}:</strong><br>${aInnerStr} &nbsp;|&nbsp; ${aOuterStr}<br>${d.mat_tip}`;

    if (boxStyle === 'cylinder') {
        drawDiecut('cylinder', 0, 0, 0, lastSizes.inner.outerD);
    } else {
        drawDiecut(boxStyle, lastSizes.inner.L||0, lastSizes.inner.W||0, lastSizes.inner.H||0, 0);
    }

    window._lastSizes = lastSizes;
    if (document.getElementById('tab-model3d').classList.contains('active')) {
        window._refresh3D && window._refresh3D();
    }
}

['prodL','prodW','prodH','perSmall','perOuter','gap','flute','boxType','outerBoxType','joint'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.addEventListener('input', refreshAll); if(el.tagName==='SELECT') el.addEventListener('change', refreshAll); }
});

applyUnitToggle();
applyI18n();
refreshAll();
</script>

<!-- Three.js 3D Module with Product Arrangement -->
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    const MM_PER_INCH = 25.4;
    function fmt(val, decimals) {
        const unit = localStorage.getItem('pkgUnit') || 'mm';
        if (unit === 'inch') return (val / MM_PER_INCH).toFixed(decimals || 2);
        return Math.round(val);
    }
    function unitLabel() {
        return (localStorage.getItem('pkgUnit') || 'mm') === 'inch' ? 'inch' : 'mm';
    }

    // 创建带内部摆放的3D场景
    function create3DWithContents(containerId, title, colorHex, boxSize, contents, isCylinder, perCount, arrangement, itemSize) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1218);
        
        const w = container.clientWidth;
        const h = container.clientHeight || 220;
        const camera = new THREE.PerspectiveCamera(45, w/h, 1, 3000);
        camera.position.set(160, 130, 160);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(w, h);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.innerHTML = '';
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        
        // 灯光
        const ambient = new THREE.AmbientLight(0x304050, 1.0);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(2, 3, 2);
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x4466aa, 0.5);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        
        // 计算缩放系数
        let scale = 1;
        if (!isCylinder && boxSize) {
            const maxDim = Math.max(boxSize.L || 50, boxSize.W || 50, boxSize.H || 50, 1);
            scale = Math.min(130 / maxDim, 1.6);
        } else if (isCylinder && boxSize) {
            const maxDim = Math.max((boxSize.outerD || 50), (boxSize.outerH || 50), 1);
            scale = Math.min(130 / maxDim, 1.6);
        }
        
        // 绘制外箱/容器（半透明）
        let outerMesh;
        if (isCylinder) {
            const D = (boxSize.outerD || boxSize.D || 100) * scale;
            const H = (boxSize.outerH || boxSize.H || 100) * scale;
            const geo = new THREE.CylinderGeometry(D/2, D/2, H, 48);
            const mat = new THREE.MeshPhongMaterial({ color: colorHex, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
            outerMesh = new THREE.Mesh(geo, mat);
            outerMesh.castShadow = true;
            scene.add(outerMesh);
            // 边框
            const edges = new THREE.EdgesGeometry(new THREE.CylinderGeometry(D/2, D/2, H, 24));
            const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x88aaff, linewidth: 1 }));
            outerMesh.add(wire);
        } else {
            const L = (boxSize.L || 100) * scale;
            const W = (boxSize.W || 100) * scale;
            const H = (boxSize.H || 100) * scale;
            const geo = new THREE.BoxGeometry(L, H, W);
            const mat = new THREE.MeshPhongMaterial({ color: colorHex, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
            outerMesh = new THREE.Mesh(geo, mat);
            outerMesh.castShadow = true;
            scene.add(outerMesh);
            const edges = new THREE.EdgesGeometry(geo);
            const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x88aaff }));
            outerMesh.add(wire);
        }
        
        // 绘制内部物品（产品阵列）
        if (contents && contents.length > 0 && arrangement && itemSize) {
            const itemW = itemSize.L * scale;
            const itemH = itemSize.H * scale;
            const itemD = itemSize.W * scale;
            const boxW = (boxSize.L || 100) * scale;
            const boxH = (boxSize.H || 100) * scale;
            const boxD = (boxSize.W || 100) * scale;
            
            // 计算起始位置（居中）
            const startX = -boxW/2 + itemW/2;
            const startY = -boxH/2 + itemH/2;
            const startZ = -boxD/2 + itemD/2;
            
            const gapX = itemW;
            const gapY = itemH;
            const gapZ = itemD;
            
            const countX = arrangement[0] || 1;
            const countY = arrangement[1] || 1;
            const countZ = arrangement[2] || 1;
            
            const itemMat = new THREE.MeshPhongMaterial({ color: 0xff8866, emissive: 0x442200, shininess: 60 });
            
            for (let i = 0; i < countX && i < 6; i++) {
                for (let j = 0; j < countY && j < 6; j++) {
                    for (let k = 0; k < countZ && k < 6; k++) {
                        const posX = startX + i * gapX;
                        const posY = startY + j * gapY;
                        const posZ = startZ + k * gapZ;
                        const itemGeo = new THREE.BoxGeometry(itemW, itemH, itemD);
                        const itemMesh = new THREE.Mesh(itemGeo, itemMat);
                        itemMesh.position.set(posX, posY, posZ);
                        itemMesh.castShadow = true;
                        scene.add(itemMesh);
                    }
                }
            }
        }
        
        // CSS2D 文字标签
        const div = document.createElement('div');
        const ul = unitLabel();
        let sizeText = '';
        if (isCylinder) {
            sizeText = `Ø${fmt(boxSize.outerD || boxSize.D || 0,1)}×${fmt(boxSize.outerH || boxSize.H || 0,1)} ${ul}`;
        } else {
            sizeText = `${fmt(boxSize.L || 0,0)}×${fmt(boxSize.W || 0,0)}×${fmt(boxSize.H || 0,0)} ${ul}`;
        }
        div.innerHTML = `<strong>${title}</strong><br>${sizeText}<br>📦 内含 ${perCount || 0} 个物品`;
        div.style.cssText = `color:#ffeecc;font-size:11px;font-weight:bold;background:rgba(0,0,0,0.7);padding:5px 12px;border-radius:20px;border-left:3px solid #${colorHex.toString(16).padStart(6,'0')};text-align:center;line-height:1.5;pointer-events:none;white-space:nowrap;`;
        const labelObj = new CSS2DObject(div);
        const objHeight = isCylinder ? ((boxSize.outerH || 100) * scale) : ((boxSize.H || 100) * scale);
        labelObj.position.set(0, objHeight/2 + 18, 0);
        scene.add(labelObj);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(w, h);
        labelRenderer.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
        container.appendChild(labelRenderer.domElement);
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        new ResizeObserver(() => {
            const w2 = container.clientWidth, h2 = container.clientHeight || 220;
            renderer.setSize(w2, h2);
            labelRenderer.setSize(w2, h2);
            camera.aspect = w2/h2;
            camera.updateProjectionMatrix();
        }).observe(container);
    }
    
    function refresh3D() {
        const s = window._lastSizes;
        if (!s) return;
        const ul = unitLabel();
        
        // 产品单个展示
        const prodSize = { L: s.product.L, W: s.product.W, H: s.product.H };
        create3DWithContents('canvasProd', 'Product', 0xff8866, prodSize, [], false, 1, [1,1,1], s.product);
        
        // 内盒（容器）：内部放置产品阵列
        let innerContents = [];
        let innerArrangement = s.inner.arrangement || [1,1,1];
        if (s.inner && !s.inner.isCyl && s.inner.arrangement) {
            // 生成产品占位列表
            innerArrangement = s.inner.arrangement;
        } else if (s.inner && s.inner.isCyl) {
            innerArrangement = [1,1,1];
        }
        const innerBoxSize = s.inner.isCyl ? { outerD: s.inner.outerD, outerH: s.inner.outerH } : { L: s.inner.L, W: s.inner.W, H: s.inner.H };
        create3DWithContents('canvasInner', 'Container', 0xffaa66, innerBoxSize, [1], s.inner.isCyl, s.inner.perCount, innerArrangement, s.product);
        
        // 外箱：内部放置容器阵列
        let outerArrangement = s.outer.arrangement || [1,1,1];
        const outerBoxSize = s.outer.isCyl ? { outerD: s.outer.L, outerH: s.outer.H } : { L: s.outer.L, W: s.outer.W, H: s.outer.H };
        const innerItemSize = s.inner.isCyl ? { L: s.inner.outerD, W: s.inner.outerD, H: s.inner.outerH } : { L: s.inner.L, W: s.inner.W, H: s.inner.H };
        create3DWithContents('canvasOuter', 'Outer Box', 0x66dd99, outerBoxSize, [1], s.outer.isCyl, s.outer.perCount, outerArrangement, innerItemSize);
        
        // 更新底部文字信息
        const lang = localStorage.getItem('pkgLang') || 'en';
        const d = I18N[lang];
        document.getElementById('prodInfo').innerHTML = `${d.scene_product}: ${fmt(s.product.L,0)}×${fmt(s.product.W,0)}×${fmt(s.product.H,0)} ${ul}`;
        let innerInfo = '';
        if (s.inner.isCyl) {
            innerInfo = `${d.scene_container}: Ø${fmt(s.inner.outerD,1)}×${fmt(s.inner.outerH,1)} ${ul} &nbsp;<span class="area-hl">| ${d.r_area} ${s.inner.area.toFixed(3)} m²</span><br>📦 内含 ${s.inner.perCount} 个产品`;
        } else {
            innerInfo = `${d.scene_container}: ${fmt(s.inner.L,0)}×${fmt(s.inner.W,0)}×${fmt(s.inner.H,0)} ${ul} &nbsp;<span class="area-hl">| ${d.r_area} ${s.inner.area.toFixed(3)} m²</span><br>📦 内含 ${s.inner.perCount} 个产品 (${s.inner.arrangement ? s.inner.arrangement.join('×') : '?'} 排列)`;
        }
        let outerInfo = '';
        if (s.outer.isCyl) {
            outerInfo = `${d.scene_outer}: Ø${fmt(s.outer.L,1)}×${fmt(s.outer.H,1)} ${ul} &nbsp;<span class="area-hl">| ${d.r_area} ${s.outer.area.toFixed(3)} m²</span><br>📦 内含 ${s.outer.perCount} 个容器`;
        } else {
            outerInfo = `${d.scene_outer}: ${fmt(s.outer.L,0)}×${fmt(s.outer.W,0)}×${fmt(s.outer.H,0)} ${ul} &nbsp;<span class="area-hl">| ${d.r_area} ${s.outer.area.toFixed(3)} m²</span><br>📦 内含 ${s.outer.perCount} 个容器 (${s.outer.arrangement ? s.outer.arrangement.join('×') : '?'} 排列)`;
        }
        document.getElementById('innerInfo').innerHTML = innerInfo;
        document.getElementById('outerInfo').innerHTML = outerInfo;
    }
    
    window._refresh3D = refresh3D;
</script>
